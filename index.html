
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCNA Exam Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
      <div class="container">
        <h1 class="title">CCNA Exam Simulation</h1>
        
        <div class="username-section">
          <label for="username-input" class="username-label">Enter your name:</label>
          <input type="text" id="username-input" class="username-input" placeholder="Your name" maxlength="50">
        </div>
        
        <div class="info-card">
          <div class="info-item">
            <span class="info-label">Total Questions:</span>
            <span id="total-questions" class="info-value">30</span>
          </div>
          <div class="info-item">
            <span class="info-label">Time Limit:</span>
            <span class="info-value">15 Minutes</span>
          </div>
          <div class="info-item">
            <span class="info-label">Passing Score:</span>
            <span class="info-value">70%</span>
          </div>
        </div>
        
        <button id="start-btn" class="btn btn-primary">Start Exam</button>
        
        <div class="leaderboard-section">
          <h2 class="leaderboard-title">🏆 Leaderboard</h2>
          <div id="leaderboard" class="leaderboard"></div>
        </div>
      </div>
    </div>

    <!-- Exam Screen -->
    <div id="exam-screen" class="screen">
      <div class="exam-header">
        <div class="exam-title">CCNA Exam</div>
        <div id="timer" class="timer">15:00</div>
      </div>
      <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <div class="exam-content">
        <div class="question-nav">
          <div class="nav-title">Question Navigator</div>
          <div id="question-grid" class="question-grid"></div>
        </div>
        <div class="question-area">
          <div class="question-header">
            <span id="question-number" class="question-number">Question 1 / 30</span>
            <button id="flag-btn" class="btn btn-outline">Flag for Review</button>
          </div>
          <div id="question-text" class="question-text"></div>
          <div id="question-image" class="question-image"></div>
          <div id="choices-container" class="choices-container"></div>
          <div class="navigation-buttons">
            <div class="left-buttons">
              <button id="prev-btn" class="btn btn-outline">Previous</button>
            </div>
            <div class="right-buttons">
              <button id="next-btn" class="btn btn-outline">Next</button>
              <button id="submit-btn" class="btn btn-primary">Submit Exam</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="results-screen" class="screen">
      <div class="container">
        <h1 class="title" id="results-title">Exam Results</h1>
        <div class="score-card">
          <div id="score-value" class="score-value">0 / 30</div>
          <div id="score-percentage" class="score-percentage">0%</div>
          <div id="pass-fail" class="pass-fail"></div>
        </div>
        <div class="results-info">
          <div class="info-item">
            <span class="info-label">Time Taken:</span>
            <span id="time-taken" class="info-value">00:00</span>
          </div>
        </div>
        <div class="results-buttons">
          <button id="review-btn" class="btn btn-primary">Review Answers</button>
          <button id="retake-btn" class="btn btn-outline">Retake Exam</button>
        </div>
      </div>
    </div>

    <!-- Review Screen -->
    <div id="review-screen" class="screen">
      <div class="exam-header">
        <div class="exam-title">Answer Review</div>
        <button id="back-to-results-btn" class="btn btn-outline">Back to Results</button>
      </div>
      <div class="exam-content">
        <div class="question-nav">
          <div class="nav-title">Question Navigator</div>
          <div id="review-grid" class="question-grid"></div>
        </div>
        <div class="question-area">
          <div class="question-header">
            <span id="review-question-number" class="question-number">Question 1 / 30</span>
          </div>
          <div id="review-question-text" class="question-text"></div>
          <div id="review-question-image" class="question-image"></div>
          <div id="review-choices-container" class="choices-container"></div>
          <div id="explanation-container" class="explanation-container"></div>
          <div class="navigation-buttons">
            <div class="left-buttons">
              <button id="review-prev-btn" class="btn btn-outline">Previous</button>
            </div>
            <div class="right-buttons">
              <button id="review-next-btn" class="btn btn-outline">Next</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
